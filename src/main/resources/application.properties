spring.application.name=Aauto_Biblioteca_Cadena
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/AutoBiblioteca
spring.datasource.username=postgres
spring.datasource.password=2411
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita el error de referencia circular al serializar JSON
spring.jackson.serialization.fail-on-empty-beans=false
